services:
  bibliofuse:
    image: "${BIBLIOFUSE_IMAGE:-ghcr.io/mlt-solutions/bibliofuse-nas:0.1.5}"
    container_name: bibliofuse-nas
    user: "${PUID:-1026}:${PGID:-100}"
    read_only: true
    init: true
    restart: unless-stopped
    network_mode: host
    environment:
      BF_CONFIG_DIR: /config
      BF_CACHE_DIR: /cache
      BF_LIBRARY_DIR: /volume1
      BF_LIBRARY_BROWSE_ROOTS: "[]"
      BF_SYNOLOGY_SHARE_DISCOVERY: "true"
      BF_SYNOLOGY_ACL_TOOL: none
      BF_SERVER_PIN: "${BF_SERVER_PIN:-}"
      BF_DISCOVERY_MODE: bonjour
      BF_SERVICE_NAME: "${BF_SERVICE_NAME:-BiblioFuse NAS}"
      BF_LAN_HOST: auto
      BF_TRUSTED_PROXIES: "${BF_TRUSTED_PROXIES:-}"
      BF_TIME_ZONE: "${BF_TIME_ZONE:-UTC}"
    volumes:
      - "${CONFIG_PATH:?Select a persistent BiblioFuse config folder}:/config"
      - "${CACHE_PATH:?Select a BiblioFuse cache folder}:/cache"
      - "/volume1:/volume1:ro"
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
